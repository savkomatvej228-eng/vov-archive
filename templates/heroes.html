{% extends "base.html" %}

{% block content %}
<div class="archive-intro">
    <div class="inventory-tag">РАЗДЕЛ: ГЕРОИ И ПОДВИГИ<br>СТАТУС: РАССЕКРЕЧЕНО</div>
    <h1>ГЕРОИ СОВЕТСКОГО СОЮЗА</h1>
    <ul class="archive-toc">
        {% for hero in heroes %}
        <li>
            <a href="/hero/{{ hero.id }}" class="toc-link">
                <span class="toc-num">{{ loop.index }}.</span>
                <div class="toc-content">
                    <h3>{{ hero.name }}</h3>
                    <p>{{ hero.description }}</p>
                </div>
            </a>
        </li>
        {% endfor %}
    </ul>
    <div class="stain"></div>
</div>
{% endblock %}
